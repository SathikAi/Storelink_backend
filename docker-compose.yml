version: '3.9'

services:

  # ── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: storelink_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: storelink
      POSTGRES_USER: storelink_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - storelink_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storelink_user -d storelink"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (rate limiting / cache) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: storelink_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - storelink_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storelink_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_ENABLED: "true"
      REDIS_TTL: "300"
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: "100"
      RATE_LIMIT_WINDOW: "60"
      ENVIRONMENT: production
      DEBUG: "false"
      OTP_MOCK: "false"
      OTP_EXPIRY_MINUTES: "5"
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_DASHBOARD_KEY: ${ADMIN_DASHBOARD_KEY}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: "5242880"
      LOG_LEVEL: INFO
      LOG_FILE: /var/log/storelink/app.log
      SENTRY_DSN: ${SENTRY_DSN:-}
      DODO_PAYMENTS_API_KEY: ${DODO_PAYMENTS_API_KEY:-}
      DODO_PAYMENTS_WEBHOOK_KEY: ${DODO_PAYMENTS_WEBHOOK_KEY:-}
      DODO_PAYMENTS_PRODUCT_ID: ${DODO_PAYMENTS_PRODUCT_ID:-}
      DODO_PAYMENTS_ENVIRONMENT: ${DODO_PAYMENTS_ENVIRONMENT:-live_mode}
      DODO_PAYMENTS_RETURN_URL: ${DODO_PAYMENTS_RETURN_URL:-https://storelink.sbs/upgrade-success}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/var/log/storelink
    networks:
      - storelink_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend (Flutter Web) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL}
        WEB_APP_URL: ${WEB_APP_URL}
    container_name: storelink_frontend
    restart: unless-stopped
    networks:
      - storelink_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Admin Portal (React) ──────────────────────────────────
  admin-portal:
    build:
      context: ./admin-portal
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${API_BASE_URL}
    container_name: storelink_admin
    restart: unless-stopped
    networks:
      - storelink_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Supabase IPv4→IPv6 proxy (Docker has no IPv6 routing) ──
  supabase-proxy:
    image: alpine/socat
    container_name: storelink_supabase_proxy
    restart: always
    network_mode: host
    command: TCP4-LISTEN:5433,fork,reuseaddr TCP6:[2406:da1a:6b0:f61b:1048:8a74:ee60:a4eb]:5432

  # ── Nginx (reverse proxy + SSL) ────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: storelink_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      admin-portal:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/uploads:/var/www/uploads:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - storelink_net

  # ── Certbot (SSL auto-renew) ───────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: storelink_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:

networks:
  storelink_net:
    driver: bridge
